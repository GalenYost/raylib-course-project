name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_linux:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          pacman -Sy --noconfirm base-devel tar make clang raylib \
          mesa libx11 libxrandr libxi libxcursor libxinerama
      - name: build
        run: make -B
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: app

  build_windows:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: install deps
        run: |
          pacman -Sy --noconfirm base-devel mingw-w64-gcc curl unzip make
          curl -LO https://github.com/raysan5/raylib/releases/download/5.5/raylib-5.5_win64_mingw-w64.zip
          unzip raylib-5.5_win64_mingw-w64.zip 
          mkdir -p lib
          cp raylib-5.5_win64_mingw-w64/lib/raylib.dll ./raylib.dll
          cp /usr/x86_64-w64-mingw32/bin/libgcc_s_seh-1.dll ./
          cp /usr/x86_64-w64-mingw32/bin/libstdc++-6.dll ./
          cp /usr/x86_64-w64-mingw32/bin/libwinpthread-1.dll ./
          rm -rf raylib-5.5_win64_mingw-w64
      - name: build
        run: TARGET=windows make -B
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            *.exe
            *.dll
            *.ttf
